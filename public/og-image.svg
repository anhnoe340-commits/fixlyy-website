  <rect x="680" y="246" width="440" height="80" rx="12" fill="white" fill-opacity="0.03"/>
  <rect x="680" y="246" width="440" height="80" rx="12" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <text x="700" y="274" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="14" font-weight="700" fill="white">Mme Bernard</text>
  <text x="700" y="292" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="12" fill="#9CA3AF">Chauffe-eau en panne · 11:15</text>
  <rect x="1046" y="256" width="58" height="24" rx="12" fill="#3B5BF5" fill-opacity="0.1"/>
  <rect x="1046" y="256" width="58" height="24" rx="12" fill="none" stroke="#3B5BF5" stroke-opacity="0.25" stroke-width="1"/>
  <text x="1075" y="272" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="11" font-weight="700" fill="#6B8AFF" text-anchor="middle">RDV</text>
  <text x="700" y="316" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="12" fill="#10B981" font-weight="600">✓ Devis 450 € · SMS envoyé</text>

  <!-- Stats row -->
  <rect x="680" y="342" width="136" height="72" rx="12" fill="white" fill-opacity="0.04"/>
  <text x="748" y="375" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle">127</text>
  <text x="748" y="396" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">appels</text>

  <rect x="830" y="342" width="136" height="72" rx="12" fill="white" fill-opacity="0.04"/>
  <text x="898" y="375" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="26" font-weight="900" fill="white" text-anchor="middle">94</text>
  <text x="898" y="396" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">devis</text>

  <rect x="980" y="342" width="140" height="72" rx="12" fill="white" fill-opacity="0.04"/>
  <text x="1050" y="375" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="26" font-weight="900" fill="#10B981" text-anchor="middle">+2 400€</text>
  <text x="1050" y="396" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="11" fill="#6B7280" text-anchor="middle">récupérés/mois</text>

  <!-- SMS preview -->
  <rect x="680" y="430" width="440" height="110" rx="12" fill="white" fill-opacity="0.03"/>
  <rect x="680" y="430" width="440" height="110" rx="12" fill="none" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <text x="700" y="455" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="11" fill="#6B7280" font-weight="600">💬 SMS · envoyé en 30 sec</text>
  <text x="700" y="476" font-family="Courier New, monospace" font-size="12" fill="rgba(255,255,255,0.6)">📞 M. Dupont · Fuite sous évier</text>
  <text x="700" y="496" font-family="Courier New, monospace" font-size="12" fill="rgba(255,255,255,0.6)">⚡ URGENT · Devis estimé :</text>
  <text x="700" y="496" font-family="Courier New, monospace" font-size="12" fill="#10B981">
    <tspan dx="232">280 €</tspan>
  </text>
  <text x="700" y="516" font-family="Courier New, monospace" font-size="12" fill="rgba(255,255,255,0.6)">📍 Vincennes · <tspan fill="#3B5BF5">08:42</tspan></text>

  <!-- Bottom URL -->
  <rect x="0" y="588" width="1200" height="42" fill="white" fill-opacity="0.03"/>
  <line x1="0" y1="588" x2="1200" y2="588" stroke="white" stroke-opacity="0.06" stroke-width="1"/>
  <text x="600" y="614" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="16" font-weight="700" fill="white" text-anchor="middle" opacity="0.5">fixlyy.fr</text>
</svg>
