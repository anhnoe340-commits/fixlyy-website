  <rect x="382" y="450" width="166" height="44" rx="10" fill="white" fill-opacity="0.05"/>
  <rect x="382" y="450" width="166" height="44" rx="10" fill="none" stroke="white" stroke-opacity="0.1" stroke-width="1"/>
