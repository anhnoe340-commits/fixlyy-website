<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#090D1A"/>
      <stop offset="100%" stop-color="#0F1527"/>
    </linearGradient>
    <linearGradient id="glow" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B5BF5" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#3B5BF5" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="centerGlow" cx="35%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#3B5BF5" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#3B5BF5" stop-opacity="0"/>
    </radialGradient>
    <filter id="blur">
      <feGaussianBlur stdDeviation="40"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Glow blobs -->
  <circle cx="300" cy="280" r="300" fill="#3B5BF5" opacity="0.08" filter="url(#blur)"/>
  <circle cx="950" cy="400" r="200" fill="#3B5BF5" opacity="0.05" filter="url(#blur)"/>

  <!-- Subtle grid lines -->
  <g stroke="#3B5BF5" stroke-opacity="0.06" stroke-width="1">
    <line x1="0" y1="210" x2="1200" y2="210"/>
    <line x1="0" y1="420" x2="1200" y2="420"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
  </g>

  <!-- Left content zone -->
  <!-- Logo icon simplified (dark square + F) -->
  <rect x="64" y="64" width="64" height="64" rx="16" fill="#061225"/>
  <rect x="64" y="64" width="64" height="64" rx="16" fill="none" stroke="#3B5BF5" stroke-width="1.5" stroke-opacity="0.4"/>
  <!-- Diamond dot -->
  <rect x="89" y="73" width="10" height="10" rx="1" transform="rotate(45 94 78)" fill="white" opacity="0.9"/>
  <!-- F letter -->
  <text x="96" y="118" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="40" font-weight="900" text-anchor="middle" fill="#3B5BF5">F</text>

  <!-- Brand name -->
  <text x="148" y="107" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="32" font-weight="900" fill="white" letter-spacing="-0.5">Fix</text>
  <text x="207" y="107" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="32" font-weight="900" fill="#3B5BF5" letter-spacing="-0.5">lyy</text>

  <!-- Badge -->
  <rect x="64" y="162" width="232" height="32" rx="16" fill="#3B5BF5" fill-opacity="0.12"/>
  <rect x="64" y="162" width="232" height="32" rx="16" fill="none" stroke="#3B5BF5" stroke-opacity="0.3" stroke-width="1"/>
  <circle cx="85" cy="178" r="5" fill="#3B5BF5"/>
  <text x="97" y="183" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="13" font-weight="600" fill="#3B5BF5">Secrétaire IA · Île-de-France</text>

  <!-- Main headline -->
  <text x="64" y="280" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="58" font-weight="900" fill="white" letter-spacing="-1.5">Ne ratez plus</text>
  <text x="64" y="350" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="58" font-weight="900" fill="#3B5BF5" letter-spacing="-1.5">jamais</text>
  <text x="64" y="350" font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="58" font-weight="900" fill="white" letter-spacing="-1.5" x="276">&#160;un appel.</text>

  <!-- Line 3 of headline with text continuation -->
  <text font-family="-apple-system, BlinkMacSystemFont, Arial, sans-serif" font-size="58" font-weight="900" fill="white" letter-spacing="-1.5">
    <tspan x="64" dy="0" y="350">
      <tspan fill="#3B5BF5">jamais</tspan>
      <tspan fill="white"> un appel.</tspan>
    </tspan>
