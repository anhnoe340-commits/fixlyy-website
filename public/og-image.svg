  <rect x="1040" y="162" width="64" height="24" rx="12" fill="#3B5BF5" fill-opacity="0.2"/>
  <rect x="1040" y="162" width="64" height="24" rx="12" fill="none" stroke="#3B5BF5" stroke-opacity="0.4" stroke-width="1"/>
